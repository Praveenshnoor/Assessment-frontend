# Production Nginx Configuration for SHNOOR Assessments Frontend
# Optimized for Lighthouse 100 scores

# Worker processes and connections
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    # Basic settings
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ==========================================
    # GZIP COMPRESSION
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        application/xml+rss
        font/eot
        font/opentype
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ==========================================
    # BROTLI COMPRESSION (if module installed)
    # ==========================================
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types
    #     application/javascript
    #     application/json
    #     application/manifest+json
    #     application/xml
    #     font/eot
    #     font/opentype
    #     font/otf
    #     font/ttf
    #     image/svg+xml
    #     text/css
    #     text/javascript
    #     text/plain
    #     text/xml;

    # ==========================================
    # SECURITY HEADERS
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=self, microphone=self, fullscreen=self" always;
    
    # Content Security Policy (adjust as needed)
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: https:;" always;

    server {
        listen 80;
        server_name localhost;
        root /var/www/assessment-frontend/dist;
        index index.html;

        # ==========================================
        # CACHING STRATEGIES
        # ==========================================

        # HTML files - no cache (always fresh)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Service worker - no cache
        location = /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Hashed assets (JS, CSS with hash in filename) - long cache
        location ~* \.[a-f0-9]{8,}\.(js|css)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Regular JS/CSS (fallback)
        location ~* \.(js|css)$ {
            expires 1M;
            add_header Cache-Control "public";
        }

        # Images - long cache
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            
            # Add vary header for WebP support
            add_header Vary "Accept";
        }

        # Fonts - long cache
        location ~* \.(woff|woff2|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
        }

        # JSON files (manifest, etc.)
        location ~* \.(json|webmanifest)$ {
            expires 1d;
            add_header Cache-Control "public";
        }

        # XML files (sitemap, etc.)
        location ~* \.(xml)$ {
            expires 1d;
            add_header Cache-Control "public";
        }

        # robots.txt
        location = /robots.txt {
            expires 7d;
            add_header Cache-Control "public";
        }

        # ==========================================
        # SPA ROUTING
        # ==========================================
        location / {
            try_files $uri $uri/ /index.html =404;
        }

        # ==========================================
        # API PROXY (adjust backend URL)
        # ==========================================
        location /api/ {
            proxy_pass http://localhost:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket proxy
        location /socket.io/ {
            proxy_pass http://localhost:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # ==========================================
        # SECURITY
        # ==========================================
        
        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Deny access to sensitive files
        location ~* \.(env|log|bak|sql)$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ==========================================
    # HTTPS SERVER (uncomment for production)
    # ==========================================
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #     root /var/www/assessment-frontend/dist;
    #
    #     ssl_certificate /etc/ssl/certs/your-cert.pem;
    #     ssl_certificate_key /etc/ssl/private/your-key.pem;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # Same location blocks as above...
    # }

    # HTTP to HTTPS redirect
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$server_name$request_uri;
    # }
}
