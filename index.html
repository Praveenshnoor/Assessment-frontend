<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>SHNOOR Assessments - Secure Examination Portal</title>
    <meta name="title" content="SHNOOR Assessments - Secure Examination Portal" />
    <meta name="description" content="Secure Examination Portal for SHNOOR Assessments. Sign in to access assigned assessments, take proctored tests, and track your progress." />
    <meta name="keywords" content="SHNOOR, assessments, examination, proctored tests, online exam, recruitment, placement" />
    <meta name="author" content="SHNOOR" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#44448E" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://assessments.shnoor.com/" />
    <meta property="og:title" content="SHNOOR Assessments - Secure Examination Portal" />
    <meta property="og:description" content="Secure Examination Portal for SHNOOR Assessments. Access assigned tests, take proctored exams, and track your results." />
    <meta property="og:image" content="/favicon.png" />
    <meta property="og:site_name" content="SHNOOR Assessments" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://assessments.shnoor.com/" />
    <meta property="twitter:title" content="SHNOOR Assessments - Secure Examination Portal" />
    <meta property="twitter:description" content="Secure Examination Portal for SHNOOR Assessments. Access assigned tests, take proctored exams, and track your results." />
    <meta property="twitter:image" content="/favicon.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <!-- Preload critical font with font-display swap -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" />
    </noscript>
    
    <!-- Critical CSS for initial render -->
    <style>
      /* Critical above-the-fold styles */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { line-height: 1.5; -webkit-text-size-adjust: 100%; }
      body { 
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #E0E0EF;
        color: #0E0E27;
      }
      #root { min-height: 100vh; }
      /* Loading spinner styles */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #E0E0EF;
        z-index: 9999;
      }
      .loader-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #44448E;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      /* Hide loader when React mounts */
      .app-loaded .initial-loader { display: none; }
    </style>
  </head>
  <body>
    <!-- Initial loader shown before React hydrates -->
    <div class="initial-loader" aria-label="Loading application" role="status">
      <div class="loader-spinner"></div>
      <span class="sr-only">Loading...</span>
    </div>
    
    <div id="root"></div>
    
    <!-- Defer non-critical JavaScript -->
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Remove loader when app is ready -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Hide initial loader when React app is ready
        window.addEventListener('load', function() {
          document.body.classList.add('app-loaded');
        });
      });
    </script>
  </body>
</html>
