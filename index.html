<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHNOOR Assessments - Secure Examination Portal</title>
    <meta name="description" content="Secure Examination Portal for Shnoor Assessments. Sign in to access assigned assessments and track progress." />
    
    <!-- DNS prefetch for external domains -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com">
    
    <!-- Load fonts with proper fallback -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" 
      rel="stylesheet"
    >
    
    <!-- Critical CSS to prevent flash of unstyled content -->
    <style>
      body {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
      
      /* Prevent layout shift by reserving space for images */
      img {
        max-width: 100%;
        height: auto;
      }
      
      /* Loading state */
      #root {
        min-height: 100vh;
      }
      
      /* Prevent flash of unstyled content */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: #374151;
      }
    </style>
  </head>
  <body>
    <main id="root">
      <div class="loading">Loading...</div>
    </main>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
